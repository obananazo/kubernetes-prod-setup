apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-portfolio
  template:
    metadata:
      labels:
        app: k8s-portfolio
    spec:
      containers:
        - name: k8s-portfolio
          image: k8s-portfolio:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
